<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink zoo 1000 — Фото-Архив</title>
    <style>
        /* Базовые настройки резинового экрана */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #121214; color: #e1e1e6; margin: 0; padding: 1vw; width: 100%; min-height: 100vh; overflow-x: hidden; }
        
        /* Фиксированная верхняя панель управления */
        .top-bar { display: flex; flex-direction: column; gap: 12px; background: #1e1e24; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 15px; position: sticky; top: 10px; z-index: 100; width: 100%; transition: max-height 0.2s ease-in-out; }
        .top-controls { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; width: 100%; }
        
        .title-group { flex: 1; min-width: 180px; text-align: left; }
        .title-group h1 { margin: 0; font-size: calc(18px + 0.5vw); color: #fff; }
        .title-group p { margin: 3px 0 0 0; font-size: calc(11px + 0.1vw); color: #a8a8b3; }
        
        .collapsible-content { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .top-bar.collapsed .collapsible-content { display: none; }
        
        .control-buttons { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; width: 100%; justify-content: flex-end; }
        /* БЛОК ДОСТИЖЕНИЙ (5 НАГРАД) */
        .achievements-box { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; justify-content: center; margin-top: 5px; border-top: 1px solid #29292e; padding-top: 10px; }
        .medal { background: #141416; border: 1px solid #29292e; padding: 6px 12px; border-radius: 6px; font-size: 11px; display: flex; align-items: center; gap: 6px; opacity: 0.25; transition: 0.2s; color: #a8a8b3; font-weight: bold; }
        .medal.unlocked { opacity: 1; background: #202024; border-color: #ffb703; color: #ffb703; box-shadow: 0 0 8px rgba(255,183,3,0.2); }
        
        /* Кнопки с аппаратным ускорением для исключения залипаний */
        button { background: #04d361; color: #fff; border: none; padding: 10px 18px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.1s ease; transform: translateZ(0); }
        button:hover { background: #06b955; }
        button:disabled { background: #494950; cursor: not-allowed; }
        .toggle-btn { background: #323238; color: #fff; min-width: 110px; padding: 8px 14px; font-size: 12px; }
        .reset-btn { background: #e04545; }
        .reset-btn:hover { background: #c73232; }
        
        /* Фильтры стихий */
        .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; width: 100%; border-top: 1px solid #29292e; padding-top: 10px; justify-content: center; }
        .filter-btn { background: #29292e; color: #a8a8b3; border: 1px solid #323238; padding: 6px 14px; font-size: 12px; min-width: 80px; }
        .filter-btn:hover { background: #323238; color: #fff; }
        .filter-btn.active { background: #04d361; color: #fff; border-color: #04d361; }
        .filter-btn.owned-filter { border-color: #00b4d8; }
        .filter-btn.owned-filter.active { background: #00b4d8; border-color: #00b4d8; }
        
        .counter-badge { background: #29292e; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 13px; border: 1px solid #323238; text-align: center; }
        .status-box { font-style: italic; color: #a8a8b3; padding: 10px; border-radius: 6px; background: #141416; min-width: 180px; font-size: 12px; text-align: center; flex: 1; }
        
        /* ЕСТЕСТВЕННАЯ НЕ-ЗЕРКАЛЬНАЯ КАМЕРА С ДИНАМИЧЕСКИМ РАЗМЕРОМ */
        #camera-view { width: 140px; height: 95px; display: none; background: #000; border-radius: 6px; object-fit: cover; border: 2px solid #04d361; transition: width 0.4s ease, height 0.4s ease, max-width 0.4s ease; }
        #camera-view.scanning { width: 100%; max-width: 320px; height: 200px; }
        
        /* Сетка и карточки */
        .pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(calc(100px + 3vw), 1fr)); gap: 6px; width: 100%; padding-bottom: 20px; }
        
        .card { background: #1e1e24; border: 1px solid #29292e; border-radius: 6px; padding: 6px; position: relative; opacity: 0.2; font-size: 11px; display: flex; flex-direction: column; gap: 1px; width: 100%; align-items: center; text-align: center; cursor: pointer; transform: translateZ(0); will-change: transform, opacity; height: 145px; }
        .card:hover { border-color: #555; }
        .card.owned { opacity: 1; background: #202024; border-width: 2px; }
        
        .rarity-Обычный { border-color: #494950; }
        .rarity-Редкий { border-color: #2a6f97; }
        .rarity-Эпический { border-color: #7209b7; }
        .rarity-БОЖЕСТВЕННЫЙ { border-color: #ffb703; box-shadow: 0 0 8px rgba(255,183,3,0.3); }
        .card.owned.rarity-БОЖЕСТВЕННЫЙ { border-color: #ffb703; box-shadow: 0 0 12px #ffb703; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 5px #ffb703; }
            50% { box-shadow: 0 0 15px #ffb703; }
            100% { box-shadow: 0 0 5px #ffb703; }
        }
        
        /* Компактный пиксельный аватар */
        .avatar-box { width: 42px; height: 42px; border-radius: 6px; margin-bottom: 4px; display: flex; flex-wrap: wrap; overflow: hidden; padding: 1px; background: #141416; border: 1px solid #29292e; }
        .pixel { width: 33.33%; height: 33.33%; }
        
        .badge { font-size: 8px; font-weight: bold; padding: 1px 3px; border-radius: 2px; text-transform: uppercase; margin-bottom: 1px; }
        .badge-Обычный { background: #494950; color: #fff; }
        .badge-Редкий { background: #2a6f97; color: #fff; }
        .badge-Эпический { background: #7209b7; color: #fff; }
        .badge-БОЖЕСТВЕННЫЙ { background: #ffb703; color: #000; }
        
        .card-name { font-weight: bold; font-size: 11px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .card-elem { color: #a8a8b3; font-size: 10px; }
        .card-ability { color: #04d361; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; font-size: 10px; }
        .chance-lbl { color: #7c7c8a; font-size: 9px; margin-top: 2px; border-top: 1px solid #29292e; padding-top: 2px; width: 100%; }
        .status-tag { font-weight: bold; margin-top: 1px; font-size: 9px; width: 100%; }
        
        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(4px); }
        .modal-content { background: #1e1e24; border: 2px solid #323238; border-radius: 12px; max-width: 420px; width: 100%; padding: 20px; position: relative; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; gap: 10px; max-height: 95vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 12px; right: 15px; font-size: 24px; color: #7c7c8a; cursor: pointer; transition: 0.15s; font-weight: bold; }
        .modal-close:hover { color: #fff; }
        
        .modal-avatar { width: 100px; height: 100px; border-radius: 10px; display: flex; flex-wrap: wrap; overflow: hidden; padding: 4px; background: #141416; border: 2px solid #29292e; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
       .modal-avatar .pixel { width: 33.33%; height: 33.33%; }

        
        /* Окно вывода фотографии кадра поимки */
        .modal-photo-container { width: 100%; height: 160px; background: #141416; border-radius: 8px; border: 1px dashed #323238; margin-top: 5px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .modal-photo-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .modal-photo-placeholder { font-size: 12px; color: #7c7c8a; font-style: italic; text-align: center; padding: 10px; }
        
        .modal-name { font-size: 20px; font-weight: bold; color: #fff; margin: 0; }
        .modal-info { background: #141416; padding: 10px; border-radius: 8px; width: 100%; text-align: left; font-size: 13px; display: flex; flex-direction: column; gap: 5px; border: 1px solid #29292e; }
        .modal-info div { display: flex; justify-content: space-between; border-bottom: 1px dashed #29292e; padding-bottom: 3px; }
        .modal-info div:last-child { border-bottom: none; padding-bottom: 0; }
        .modal-info b { color: #fff; }
        
        @media (max-width: 600px) {
            body { padding: 5px; }
            .top-bar { padding: 10px; gap: 8px; }
            .top-controls { justify-content: center; text-align: center; }
            .title-group { text-align: center; width: 100%; }
            .control-buttons { flex-direction: column; width: 100%; align-items: stretch; }
            button { width: 100%; }
            #camera-view.scanning { max-width: 100%; height: 160px; }
            .pokedex-grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 4px; }
            .medal { font-size: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>

    <!-- СКЛАДНАЯ ВЕРХНЯЯ ПАНЕЛЬ -->
    <div id="topBar" class="top-bar">
        <div class="top-controls">
            <div class="title-group">
                <h1>🛰️ Ink zoo 1000</h1>
                <p>Фото-захват! Снимок камеры сохраняется прямо внутри карточки покемона.</p>
            </div>
            <button id="toggleBtn" class="toggle-btn" onclick="togglePanel()">▲ СВЕРНУТЬ</button>
        </div>
        
        <div class="collapsible-content">
            <!-- 5 ДОСТИЖЕНИЙ -->
            <div class="achievements-box">
                <div id="medal-fire" class="medal">🔥 Повелитель Пламени</div>
                <div id="medal-water" class="medal">💧 Магистр Глубин</div>
                <div id="medal-earth" class="medal">⛰️ Хранитель Гор</div>
                <div id="medal-air" class="medal">💨 Владыка Небес</div>
                <div id="medal-all" class="medal">🏆 Легенда Ink zoo</div>
            </div>

            <div class="control-buttons">
                <!-- Скрытые элементы для анализа цвета и моментального фотокадра -->
                <canvas id="analysis-canvas" style="display:none;" width="32" height="24"></canvas>
                <canvas id="snapshot-canvas" style="display:none;" width="400" height="300"></canvas>
                <video id="camera-view" autoplay playsinline></video>
                <div id="status" class="status-box">Готов к сканированию местности...</div>
                <div class="counter-badge">🎒 УНИКАЛЬНЫХ: <span id="bag-count">0</span> / 1000</div>
                <button id="hunt-btn" onclick="triggerCapture()">📷 ИСКАТЬ</button>
                <button class="reset-btn" onclick="resetCollection()">🗑️ СБРОС</button>
            </div>
            
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterElement('all', this)">Все</button>
                <button class="filter-btn" onclick="filterElement('Огонь 🔥', this)">Огонь 🔥</button>
                <button class="filter-btn" onclick="filterElement('Вода 💧', this)">Вода 💧</button>
                <button class="filter-btn" onclick="filterElement('Земля ⛰️', this)">Земля ⛰️</button>
                <button class="filter-btn" onclick="filterElement('Воздух 💨', this)">Воздух 💨</button>
                <button class="filter-btn owned-filter" onclick="filterElement('owned', this)">Открытые ✅</button>
            </div>
        </div>
    </div>

    <!-- СЕТКА СУЩЕСТВ -->
    <div id="pokedex-grid" class="pokedex-grid"></div>

    <!-- МОДАЛЬНОЕ ОКНО ПРОСМОТРА КАРТОЧКИ -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalBadge"></div>
            <div id="modalAvatarBox" class="modal-avatar"></div>
            <h2 id="modalName" class="modal-name"></h2>
            
            <!-- Место для отображения реального кадра поимки -->
            <div class="modal-photo-container">
                <img id="modalPhotoImg" class="modal-photo-img" src="" alt="Кадр поимки">
                <div id="modalPhotoPlaceholder" class="modal-photo-placeholder"></div>
            </div>
            
            <div id="modalInfoBlock" class="modal-info">
                <!-- Сюда JS автоматически добавит весь лор, рост и вес -->
            </div>
        </div>
    </div>

    <script>
        const elements = ["Огонь 🔥", "Вода 💧", "Земля ⛰️", "Воздух 💨"];
        const prefixes = ["Пиро", "Аква", "Гео", "Аэро", "Вулкан", "Гидро", "Терра", "Зефир", "Сильф", "Некро", "Торнадо", "Цунами", "Магма", "Небула", "Тор", "Флейм", "Шторм", "Глейшер", "Титано", "Спарк", "Крио", "Электро", "Пси", "Омега", "Альфа", "Вектор"];
        const roots = ["завр", "линг", "дог", "винг", "попот", "раптор", "мандер", "бро", "рекс", "стелла", "титан", "вульф", "клон", "лорд", "сфинкс", "кракен", "дракон", "феникс", "грифон", "элементаль", "трон", "морф", "корн", "цеце"];
        const abilities = ["Огненный смерч", "Абсолютный ноль", "Землетрясение", "Удар молнии", "Вызов цунами", "Каменный щит", "Вакуумный взрыв", "Кипящий гейзер", "Телепортация", "Гравитация", "Ментальный шторм", "Сверхновая", "Лавовый плевок", "Песчаная буря", "Звуковой удар", "Ледяной луч"];

        const titlesOrdinary = ["Младший", "Дикий", "Лесной", "Быстрый", "Малый", "Хитрый", "Озорной", "Пятнистый", "Степной", "Речной"];
        const titlesRare = ["Свирепый", "Охотник", "Ночной", "Грозный", "Теневой", "Искатель", "Следопыт", "Тайный", "Штормовой", "Бродяга"];
        const titlesEpic = ["Лорд", "Герцог", "Страж", "Рыцарь", "Магистр", "Принц", "Барон", "Ткач Заклинаний", "Паладин", "Алхимик"];
        const titlesDivine = ["Бессмертный", "Разрушитель", "Избранный", "Древний", "Создатель Миров", "Вечный", "Владыка Хаоса", "Абсолют", "Титан Времени", "Хранитель Вселенной"];

        let currentFilter = 'all';
        let audioCtx = null;
        let homeCoords = null; 

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // ЗВУКОВОЙ СИНТЕЗАТОР СИСТЕМЫ СТИХИЙ (SFX)
        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'radar') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.4);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'victory') {
                const notes = [261.63, 329.63, 392.00, 523.25];
                notes.forEach((freq, index) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(freq, now + index * 0.1);
                    g.gain.setValueAtTime(0.2, now + index * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, now + index * 0.1 + 0.3);
                    o.start(now + index * 0.1); o.stop(now + index * 0.1 + 0.3);
                });
            }
        }

        function togglePanel() {
            playSound('click');
            const bar = document.getElementById('topBar');
            const btn = document.getElementById('toggleBtn');
            if (bar.classList.contains('collapsed')) {
                bar.classList.remove('collapsed');
                btn.innerText = "▲ СВЕРНУТЬ";
            } else {
                bar.classList.add('collapsed');
                btn.innerText = "▼ РАЗВЕРНУТЬ";
            }
        }

        function seededRandom(seed) {
            let x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        function generateAvatarHTML(id, element, rarity) {
            let colors = [];
            if (element.includes("Огонь")) colors = ["#e63946", "#ff5400", "#ff7b00", "#ff9e00"];
            else if (element.includes("Вода")) colors = ["#00b4d8", "#0077b6", "#90e0ef", "#03045e"];
            else if (element.includes("Земля")) colors = ["#2a9d8f", "#70e000", "#38b000", "#007200"];
            else if (element.includes("Воздух")) colors = ["#b5179e", "#7209b7", "#4895ef", "#a2d2ff"];

            if (rarity === "БОЖЕСТВЕННЫЙ") colors.unshift("#ffb703");
            if (rarity === "Эпический") colors.unshift("#e04545");

            let html = '';
            for (let i = 1; i <= 9; i++) {
                let rand = seededRandom(id * i * 4);
                let color = rand > 0.4 ? colors[Math.floor(rand * colors.length)] : "#141416";
                html += `<div class="pixel" style="background: ${color}"></div>`;
            }
            return html;
        }

        // АВТОМАТИЧЕСКАЯ ГЕНЕРАЦИЯ ЛОРА И БИО-МЕТРИК
        function generateCreatureLore(p) {
            let baseSize = p.rarity === "БОЖЕСТВЕННЫЙ" ? 3.5 : p.rarity === "Эпический" ? 2.1 : p.rarity === "Редкий" ? 1.2 : 0.4;
            let randomModifier = seededRandom(p.id * 11);
            let height = (baseSize + (randomModifier * 1.5)).toFixed(2);
            let weight = ((baseSize * baseSize * 25) + (randomModifier * 200)).toFixed(1);

            let habitat = "", description = "";
            if (p.element.includes("Огонь")) {
                habitat = "🌋 Жерла действующих вулканов, геотермальные источники и заброшенные кибер-кузни.";
                description = "Питается раскаленной лавой и чистой тепловой энергией. Его тело выдерживает критические температуры, мгновенно воспламеняя воздух вокруг себя.";
            } else if (p.element.includes("Вода")) {
                habitat = "💧 Марианская впадина, коралловые рифы и затопленные неоновые туннели нижнего города.";
                description = "Обладает обтекаемой формой тела и светится в полной темноте. Извлекает из воды химические элементы для подзарядки био-ядра.";
            } else if (p.element.includes("Земля")) {
                habitat = "⛰️ Заброшенные кристаллические шахты, глубокие пещеры и корни гигантских секвой.";
                description = "Тело покрыто прочной кремниевой броней. Способно чувствовать малейшие вибрации почвы на расстоянии нескольких километров.";
            } else if (p.element.includes("Воздух")) {
                habitat = "💨 Вершины поднебесных скал, грозовые фронты и верхние слои стратосферы.";
                description = "Практически невесомое существо из уплотненного газа и электрических разрядов. Проводит всю жизнь в полете.";
            }

            let traitIndex = Math.floor(seededRandom(p.id * 8) * 4);
            let traits = [
                " По характеру скрытно и избегает контактов, предпочитая прятаться в коде.",
                " Обладает игривым нравом, любит устраивать мелкие электромагнитные помехи.",
                " Считается агрессивным защитником своей территории, издает ультразвуковой свист.",
                " Проявляет высокий интеллект. Способно запоминать маршруты сканеров."
            ];

            return {
                height: height + " м",
                weight: weight > 1000 ? (weight / 1000).toFixed(2) + " т" : weight + " кг",
                habitat: habitat,
                description: description + traits[traitIndex]
            };
        }

        function generatePokedex() {
            let list = [];
            for (let i = 1; i <= 1000; i++) {
                let r1 = seededRandom(i * 3); let r2 = seededRandom(i * 7); let r3 = seededRandom(i * 13); let r4 = seededRandom(i * 19);
                let elem = elements[Math.floor(r1 * elements.length)];
                let baseName = prefixes[Math.floor(r2 * prefixes.length)] + roots[Math.floor(r3 * roots.length)];
                let ability = abilities[Math.floor(r1 * abilities.length)];
                
                let rarity, chance, title;
                if (i <= 500) { rarity = "Обычный"; chance = 0.120; title = titlesOrdinary[Math.floor(r4 * titlesOrdinary.length)]; }
                else if (i <= 850) { rarity = "Редкий"; chance = 0.085; title = titlesRare[Math.floor(r4 * titlesRare.length)]; }
                else if (i <= 970) { rarity = "Эпический"; chance = 0.066; title = titlesEpic[Math.floor(r4 * titlesEpic.length)]; }
                else { rarity = "БОЖЕСТВЕННЫЙ"; chance = 0.066; title = titlesDivine[Math.floor(r4 * titlesDivine.length)]; }

                let fullName = `${baseName} ${title}`;
                list.push({ id: i, name: fullName, element: elem, ability, rarity, chance_pct: chance.toFixed(3) });
            }
            return list;
        }

        const allCreatures = generatePokedex();
        let myCollection = JSON.parse(localStorage.getItem('ink_zoo_permanent_bag_1000')) || [];
        let itemsToShow = 40; 
        let filteredCreatures = [];

        function getCopiesCount(id) {
            return myCollection.filter(item => item.id === id).length;
        }

        // Функция детального просмотра карточки с выводом реального сохраненного фотокадра
        function openModal(id) {
            playSound('click');
            const p = allCreatures.find(item => item.id === id);
            const copiesCount = getCopiesCount(id);
            const lore = generateCreatureLore(p);

            // Находим первое пойманное существо этого вида в коллекции
            const firstCaught = myCollection.find(item => item.id === id);
            
            const imgEl = document.getElementById('modalPhotoImg');
            const placeholderEl = document.getElementById('modalPhotoPlaceholder');

            // Проверяем, есть ли у карточки вшитый фотоснимок с камеры
            if (firstCaught && firstCaught.photoData) {
                imgEl.src = firstCaught.photoData;
                imgEl.style.display = "block";
                placeholderEl.style.display = "none";
            } else {
                imgEl.style.display = "none";
                placeholderEl.style.display = "block";
                placeholderEl.innerHTML = copiesCount > 0 
                    ? "📸 Снимок этого существа был утерян или поврежден." 
                    : "🔒 Карточка заблокирована. Поймайте существо на камеру, чтобы сохранить его реальный снимок!";
            }

            // Вывод геолокации GPS уличной аномалии
            let locHTML = "<span style='color: #a8a8b3;'>🏡 Домашняя зона</span>";
            if (firstCaught && firstCaught.lat && firstCaught.lon) {
                const mapURL = `https://google.com{firstCaught.lat},${firstCaught.lon}`;
                locHTML = `<a href="${mapURL}" target="_blank" style="color: #00b4d8; text-decoration: underline;">Посмотреть на карте (🌐 GPS)</a>`;
            }

            // Заполняем текстовые данные в модальном окне
            document.getElementById('modalName').innerText = p.name;
            document.getElementById('modalStatus').innerHTML = copiesCount > 0 ? '<span style="color:#04d361">✅ В ЗООПАРКЕ</span>' : '<span style="color:#7c7c8a">🔒 ДИКОЕ СУЩЕСТВО</span>';
            document.getElementById('modalElement').innerText = p.element;
            document.getElementById('modalAbility').innerText = p.ability;
            document.getElementById('modalChance').innerText = p.chance_pct + '%';
            document.getElementById('modalCopies').innerText = copiesCount;
            document.getElementById('modalId').innerText = '#' + p.id;
            
            document.getElementById('modalInfoBlock').innerHTML = `
                <div>Рост существа: <b>${lore.height}</b></div>
                <div>Вес существа: <b>${lore.weight}</b></div>
                <div>📍 Место поимки: <b>${locHTML}</b></div>
                <div style="flex-direction: column; align-items: flex-start; border-bottom: none; gap: 3px; margin-top: 4px;">
                    <span style="color: #7c7c8a; font-weight: bold;">🌍 Среда обитания:</span>
                    <span style="font-size: 12px; color: #e1e1e6; line-height: 1.3;">${lore.habitat}</span>
                </div>
                <div style="flex-direction: column; align-items: flex-start; border-bottom: none; gap: 3px; margin-top: 4px;">
                    <span style="color: #04d361; font-weight: bold;">📝 Описание и повадки:</span>
                    <span style="font-size: 12px; color: #a8a8b3; line-height: 1.3; font-style: italic;">${lore.description}</span>
                </div>
            `;
            
            document.getElementById('modalBadge').innerHTML = `<span class="badge badge-${p.rarity}">${p.rarity}</span>`;
            document.getElementById('modalAvatarBox').innerHTML = generateAvatarHTML(p.id, p.element, p.rarity);

            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function checkAchievements() {
            const ownedUniqueIds = new Set(myCollection.map(c => c.id));
            let counts = { "Огонь 🔥": 0, "Вода 💧": 0, "Земля ⛰️": 0, "Воздух 💨": 0 };
            let totals = { "Огонь 🔥": 0, "Вода 💧": 0, "Земля ⛰️": 0, "Воздух 💨": 0 };

            allCreatures.forEach(p => {
                totals[p.element]++;
                if (ownedUniqueIds.has(p.id)) counts[p.element]++;
            });

            const medals = [
                { id: 'medal-fire', cond: counts["Огонь 🔥"] === totals["Огонь 🔥"] && totals["Огонь 🔥"] > 0 },
                { id: 'medal-water', cond: counts["Вода 💧"] === totals["Вода 💧"] && totals["Вода 💧"] > 0 },
                { id: 'medal-earth', cond: counts["Земля ⛰️"] === totals["Земля ⛰️"] && totals["Земля ⛰️"] > 0 },
                { id: 'medal-air', cond: counts["Воздух 💨"] === totals["Воздух 💨"] && totals["Воздух 💨"] > 0 },
                { id: 'medal-all', cond: ownedUniqueIds.size === 1000 }
            ];

            medals.forEach(m => {
                const el = document.getElementById(m.id);
                if (m.cond) el.classList.add('unlocked');
                else el.classList.remove('unlocked');
            });
        }

        function updateFilteredList() {
            const ownedUniqueIds = new Set(myCollection.map(c => c.id));
            filteredCreatures = allCreatures.filter(p => {
                if (currentFilter === 'owned') return ownedUniqueIds.has(p.id);
                if (currentFilter !== 'all' && p.element !== currentFilter) return false;
                return true;
            });
        }

        function renderGrid(append = false) {
            const grid = document.getElementById('pokedex-grid');
            if (!append) grid.innerHTML = '';

            const fragment = document.createDocumentFragment();
            const ownedUniqueIds = new Set(myCollection.map(c => c.id));
            
            const start = append ? grid.children.length : 0;
            const end = Math.min(start + itemsToShow, filteredCreatures.length);

            for (let i = start; i < end; i++) {
                const p = filteredCreatures[i];
                const isOwned = ownedUniqueIds.has(p.id);
                
                const elCard = document.createElement('div');
                elCard.className = `card rarity-${p.rarity} ${isOwned ? 'owned' : ''}`;
                elCard.setAttribute('onclick', `openModal(${p.id})`);
                
                elCard.innerHTML = `
                    <span class="badge badge-${p.rarity}">${p.rarity}</span>
                    <div class="avatar-box">${generateAvatarHTML(p.id, p.element, p.rarity)}</div>
                    <div class="card-name">${p.name}</div>
                    <div class="card-elem">${p.element}</div>
                    <div class="card-ability">${p.ability}</div>
                    <div class="chance-lbl">🎯 ${p.chance_pct}%</div>
                    <div class="status-tag" style="color:${isOwned ? '#04d361':'#494950'}">
                        ${isOwned ? '✅ В ЗОО' : '🔒 ДИКИЙ'}
                    </div>`;
                    
                fragment.appendChild(elCard);
            }

            grid.appendChild(fragment);
            document.getElementById('bag-count').innerText = ownedUniqueIds.size;
            checkAchievements();
        }
        // Бесконечная подгрузка карточек при прокрутке страницы вниз
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 150) {
                if (document.getElementById('pokedex-grid').children.length < filteredCreatures.length) {
                    renderGrid(true);
                }
            }
        });

        // Переключение фильтров и вкладок
        function filterElement(elementName, btnElement) {
            playSound('click');
            currentFilter = elementName;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            updateFilteredList();
            renderGrid(false);
            window.scrollTo({ top: 0 });
        }

        // АНАЛИЗАТОР ЦВЕТА С КАМЕРЫ (Определяет доминирующую стихию)
        function analyzeDominantElement() {
            const video = document.getElementById('camera-view');
            const canvas = document.getElementById('analysis-canvas');
            const ctx = canvas.getContext('2d');

            try {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;

                let rSum = 0, gSum = 0, bSum = 0, lightSum = 0;

                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i+1];
                    let b = data[i+2];

                    if (r > g * 1.2 && r > b * 1.2) rSum++; 
                    else if (b > r * 1.2 && b > g * 1.2) bSum++; 
                    else if (g > r * 1.1 && g > b * 1.1) gSum++; 
                    
                    if (r > 190 && g > 190 && b > 190) lightSum++;
                }

                let max = Math.max(rSum, bSum, gSum, lightSum);
                if (max === 0) return elements[Math.floor(Math.random() * elements.length)]; 
                
                if (max === rSum) return "Огонь 🔥";
                if (max === bSum) return "Вода 💧";
                if (max === gSum) return "Земля ⛰️";
                return "Воздух 💨";
            } catch (err) {
                return elements[Math.floor(Math.random() * elements.length)];
            }
        }

        // Расчет расстояния по GPS (в метрах)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // СНЯТИЕ И ФИКСАЦИЯ СНИМКА С КАМЕРЫ (Превращает кадр в текст Base64)
        function takeSnapshot() {
            const video = document.getElementById('camera-view');
            const snapCanvas = document.getElementById('snapshot-canvas');
            const snapCtx = snapCanvas.getContext('2d');
            
            try {
                // Рисуем текущий кадр с камеры на скрытый фото-холст
                snapCtx.drawImage(video, 0, 0, snapCanvas.width, snapCanvas.height);
                // Сжимаем его в компактную строчку Jpeg
                return snapCanvas.toDataURL('image/jpeg', 0.6); 
            } catch (e) {
                return null;
            }
        }

        // РЕАЛЬНЫЙ СКАНИРУЮЩИЙ ДВИЖОК: АНАЛИЗ ЦВЕТА + СНИМОК КАДРА + GPS
        async function triggerCapture() {
            const video = document.getElementById('camera-view');
            const status = document.getElementById('status');
            const btn = document.getElementById('hunt-btn');
            
            btn.disabled = true;
            playSound('click');

            // Опрашиваем геопозицию
            let isStreetAnomaly = false;
            let currentLat = null, currentLon = null;
            try {
                if (navigator.geolocation) {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {timeout: 1500});
                    });
                    
                    currentLat = position.coords.latitude;
                    currentLon = position.coords.longitude;

                    if (!homeCoords) {
                        homeCoords = { lat: currentLat, lon: currentLon };
                    } else {
                        const distance = getDistance(homeCoords.lat, homeCoords.lon, currentLat, currentLon);
                        if (distance > 100) isStreetAnomaly = true;
                    }
                }
            } catch (e) {}
            
            // Включаем видеопоток
            try {
                if (!video.srcObject) {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = stream;
                }
                video.style.display = "block";
                video.classList.add('scanning');
                status.innerHTML = "📡 Идет сканирование пространства...<br>Наведите объектив на нужный цвет!";
            } catch (err) {
                status.innerText = "❌ Ошибка доступа к камере!";
                btn.disabled = false;
                return;
            }

            let radarSoundInterval = setInterval(() => playSound('radar'), 500);

            setTimeout(() => {
                clearInterval(radarSoundInterval);
                let dominantElement = analyzeDominantElement();

                // Делаем снимок кадра прямо сейчас, ПОКА КАМЕРА ОТКРЫТА
                let photoBase64 = takeSnapshot();

                let rarityRoll = Math.random();
                let targetRarity;
                
                if (isStreetAnomaly) {
                    if (rarityRoll <= 0.06) targetRarity = "БОЖЕСТВЕННЫЙ";
                    else if (rarityRoll <= 0.30) targetRarity = "Эпический"; 
                    else if (rarityRoll <= 0.60) targetRarity = "Редкий";
                    else targetRarity = "Обычный";
                } else {
                    if (rarityRoll <= 0.02) targetRarity = "БОЖЕСТВЕННЫЙ";
                    else if (rarityRoll <= 0.10) targetRarity = "Эпический";
                    else if (rarityRoll <= 0.40) targetRarity = "Редкий";
                    else targetRarity = "Обычный";
                }

                let pool = allCreatures.filter(c => c.rarity === targetRarity && c.element === dominantElement);
                if (pool.length === 0) pool = allCreatures.filter(c => c.rarity === targetRarity);
                
                let caught = pool[Math.floor(Math.random() * pool.length)];
                const isNew = !myCollection.some(item => item.id === caught.id);
                
                // Создаем полную копию существа для рюкзака и вшиваем уникальные уличные мета-данные
                let caughtCopy = {
                    ...caught,
                    lat: currentLat,
                    lon: currentLon,
                    photoData: photoBase64 // ВШИВАЕМ ФОТОКАДР ПРЯМО ВНУТРЬ КАРТОЧКИ ЭТОГО СУЩЕСТВА!
                };

                myCollection.push(caughtCopy);
                localStorage.setItem('ink_zoo_permanent_bag_1000', JSON.stringify(myCollection));

                if (targetRarity !== "Обычный") playSound('victory');
                else playSound('click');

                let streetTag = isStreetAnomaly ? "<br><b style='color:#ffb703'>🚀 Уличный GPS-бонус сработал!</b>" : "<br><small style='color:#a8a8b3'>🏠 Домашняя поимка. Выйдите на улицу для бонуса к редкости.</small>";
                if (isNew) {
                    status.innerHTML = `<span style="color:#04d361">🎉 Пойман новый вид (кадр сохранен):</span> <b style="color:#fff;">${caught.name}</b>! ${streetTag}`;
                } else {
                    status.innerHTML = `📡 Поймана повторка (кадр сохранен): <b style="color:#fff;">${caught.name}</b> (Всего: ${getCopiesCount(caught.id)}) ${streetTag}`;
                }

                updateFilteredList();
                renderGrid(false);
                btn.disabled = false;
                
                // Закрываем и гасим видеопоток камеры
                video.classList.remove('scanning');
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                    video.style.display = "none";
                }
            }, 2500);
        }

        function resetCollection() {
            playSound('click');
            if (confirm("Выпустить всех существ из зоопарка и обнулить фотографии?")) {
                myCollection = [];
                localStorage.removeItem('ink_zoo_permanent_bag_1000');
                document.getElementById('status').innerText = "Все существа отпущены на волю!";
                updateFilteredList();
                renderGrid(false);
            }
        }

        updateFilteredList();
        renderGrid(false);
    </script>
</body>
