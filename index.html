<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИИ Сканер Мониторов</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #1e1e2e; color: #ffffff; margin: 0; padding: 15px; }
        h2 { color: #89b4fa; margin-bottom: 15px; }
        .btn { border: none; padding: 18px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; max-width: 350px; margin: 10px auto; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-upload { background-color: #89b4fa; color: #11111b; }
        .btn-send { background-color: #a6e3a1; color: #11111b; display: none; }
        #image-container { max-width: 100%; max-height: 60vh; margin: 15px auto; display: none; background: #313244; border-radius: 8px; overflow: hidden; }
        #preview-img { max-width: 100%; display: block; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <h2>ИИ МОБИЛЬНЫЙ СКАНЕР</h2>
    
    <label class="btn btn-upload" id="upload-label">
        📸 СДЕЛАТЬ ФОТО / ГАЛЕРЕЯ
        <input type="file" id="file-input" accept="image/*" capture="environment">
    </label>

    <div id="image-container">
        <img id="preview-img">
    </div>

    <button class="btn btn-send" id="send-btn">⚡ ОТПРАВИТЬ В ИИ НА ПК</button>

    <script src="https://cloudflare.com"></script>
    <script>
        // =====================================================================
        // НАСТРОЙКА НАПРАВЛЕНИЯ (ЗАМЕНИТЕ НА СВОИ ДАННЫЕ ИЗ TELEGRAM)
        // =====================================================================
        const TG_TOKEN = "СЮДА_ВСТАВЬТЕ_ТОКЕН_ВАШЕГО_БОТА";
        const TG_CHAT_ID = "СЮДА_ВСТАВЬТЕ_ВАШ_CHAT_ID";

        let cropper;
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const imgContainer = document.getElementById('image-container');
        const sendBtn = document.getElementById('send-btn');
        const uploadLabel = document.getElementById('upload-label');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                previewImg.src = event.target.result;
                imgContainer.style.display = 'block';
                sendBtn.style.display = 'block';
                uploadLabel.innerText = "🔄 ПЕРЕСНЯТЬ ФОТО";

                if (cropper) cropper.destroy();
                
                cropper = new Cropper(previewImg, {
                    viewMode: 1,
                    autoCropArea: 0.9,
                    movable: true,
                    zoomable: true,
                    rotatable: false,
                    scalable: false
                });
            };
            reader.readAsDataURL(file);
        });

        sendBtn.addEventListener('click', function() {
            if (!cropper) return;
            
            sendBtn.disabled = true;
            sendBtn.innerText = "⏳ ИДЕТ ОТПРАВКА...";

            canvas = cropper.getCroppedCanvas({ maxWidth: 1600, maxHeight: 1600 });
            
            canvas.toBlob(function(blob) {
                const formData = new FormData();
                formData.append('chat_id', TG_CHAT_ID);
                formData.append('photo', blob, 'monitor_crop.jpg');

                // Отправляем вырезанное изображение напрямую в Telegram бота
                fetch(`https://telegram.org{TG_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if(data.ok) {
                        alert("Успешно отправлено! ИИ на ПК уже обрабатывает строку.");
                        location.reload();
                    } else {
                        alert("Ошибка Telegram: " + data.description);
                        resetButton();
                    }
                })
                .catch(err => {
                    alert("Ошибка сети: " + err);
                    resetButton();
                });
            }, 'image/jpeg', 0.85);
        });

        function resetButton() {
            sendBtn.disabled = false;
            sendBtn.innerText = "⚡ ОТПРАВИТЬ В ИИ НА ПК";
        }
    </script>
</body>
</html>
