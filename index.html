<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink zoo 1000 — Полная Коллекция</title>
    <style>
        /* Базовые настройки резинового экрана */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #121214; color: #e1e1e6; margin: 0; padding: 1vw; width: 100%; min-height: 100vh; overflow-x: hidden; }
        
        /* Складная верхняя панель управления */
        .top-bar { display: flex; flex-direction: column; gap: 12px; background: #1e1e24; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 15px; position: sticky; top: 10px; z-index: 100; width: 100%; transition: max-height 0.3s ease-in-out; }
        .top-controls { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; width: 100%; }
        
        .title-group { flex: 1; min-width: 180px; text-align: left; }
        .title-group h1 { margin: 0; font-size: calc(18px + 0.5vw); color: #fff; }
        .title-group p { margin: 3px 0 0 0; font-size: calc(11px + 0.1vw); color: #a8a8b3; }
        
        /* Контейнер скрываемых элементов */
        .collapsible-content { display: flex; flex-direction: column; gap: 12px; width: 100%; transition: all 0.3s ease; }
        .top-bar.collapsed .collapsible-content { display: none; }
        
        .control-buttons { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; width: 100%; justify-content: flex-end; }
        /* БЛОК ДОСТИЖЕНИЙ (5 НАГРАД) */
        .achievements-box { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; justify-content: center; margin-top: 5px; border-top: 1px solid #29292e; padding-top: 10px; }
        .medal { background: #141416; border: 1px solid #29292e; padding: 6px 12px; border-radius: 6px; font-size: 11px; display: flex; align-items: center; gap: 6px; opacity: 0.25; transition: 0.3s; color: #a8a8b3; font-weight: bold; }
        .medal.unlocked { opacity: 1; background: #202024; border-color: #ffb703; color: #ffb703; box-shadow: 0 0 8px rgba(255,183,3,0.2); }
        
        /* Кнопки */
        button { background: #04d361; color: #fff; border: none; padding: 10px 18px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.15s; }
        button:hover { background: #06b955; }
        button:disabled { background: #494950; cursor: not-allowed; }
        .toggle-btn { background: #323238; color: #fff; min-width: 110px; padding: 8px 14px; font-size: 12px; }
        .reset-btn { background: #e04545; }
        .reset-btn:hover { background: #c73232; }
        
        /* Фильтры стихий и новая вкладка Открытые */
        .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; width: 100%; border-top: 1px solid #29292e; padding-top: 10px; justify-content: center; }
        .filter-btn { background: #29292e; color: #a8a8b3; border: 1px solid #323238; padding: 6px 14px; font-size: 12px; min-width: 80px; }
        .filter-btn:hover { background: #323238; color: #fff; }
        .filter-btn.active { background: #04d361; color: #fff; border-color: #04d361; }
        .filter-btn.owned-filter { border-color: #00b4d8; }
        .filter-btn.owned-filter.active { background: #00b4d8; border-color: #00b4d8; }
        
        .counter-badge { background: #29292e; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 13px; border: 1px solid #323238; text-align: center; }
        .status-box { font-style: italic; color: #a8a8b3; padding: 10px; border-radius: 6px; background: #141416; min-width: 180px; font-size: 12px; text-align: center; flex: 1; }
        #camera-view { width: 140px; height: 95px; display: none; background: #000; border-radius: 6px; transform: scaleX(-1); object-fit: cover; border: 2px solid #04d361; }
        
        /* Сетка и компактные карточки */
        .pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(calc(100px + 3vw), 1fr)); gap: 6px; width: 100%; padding-bottom: 20px; }
        .card { background: #1e1e24; border: 1px solid #29292e; border-radius: 6px; padding: 6px; position: relative; opacity: 0.2; transition: 0.15s; font-size: 11px; display: flex; flex-direction: column; gap: 1px; width: 100%; align-items: center; text-align: center; content-visibility: auto; contain-intrinsic-size: 130px; cursor: pointer; }
        .card:hover { transform: translateY(-2px); border-color: #555; }
        .card.owned { opacity: 1; background: #202024; border-width: 2px; }
        
        .rarity-Обычный { border-color: #494950; }
        .rarity-Редкий { border-color: #2a6f97; }
        .rarity-Эпический { border-color: #7209b7; }
        .rarity-БОЖЕСТВЕННЫЙ { border-color: #ffb703; box-shadow: 0 0 8px rgba(255,183,3,0.3); }
        .card.owned.rarity-БОЖЕСТВЕННЫЙ { border-color: #ffb703; box-shadow: 0 0 12px #ffb703; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 5px #ffb703; }
            50% { box-shadow: 0 0 15px #ffb703; }
            100% { box-shadow: 0 0 5px #ffb703; }
        }
        
        /* Пиксельный аватар */
        .avatar-box { width: 42px; height: 42px; border-radius: 6px; margin-bottom: 4px; display: flex; flex-wrap: wrap; overflow: hidden; padding: 1px; background: #141416; border: 1px solid #29292e; }
        .pixel { width: 33.33%; height: 33.33%; }
        
        .badge { font-size: 8px; font-weight: bold; padding: 1px 3px; border-radius: 2px; text-transform: uppercase; margin-bottom: 1px; }
        .badge-Обычный { background: #494950; color: #fff; }
        .badge-Редкий { background: #2a6f97; color: #fff; }
        .badge-Эпический { background: #7209b7; color: #fff; }
        .badge-БОЖЕСТВЕННЫЙ { background: #ffb703; color: #000; }
        
        .card-name { font-weight: bold; font-size: 11px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .card-elem { color: #a8a8b3; font-size: 10px; }
        .card-ability { color: #04d361; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; font-size: 10px; }
        .chance-lbl { color: #7c7c8a; font-size: 9px; margin-top: 2px; border-top: 1px solid #29292e; padding-top: 2px; width: 100%; }
        .status-tag { font-weight: bold; margin-top: 1px; font-size: 9px; width: 100%; }
        
        /* МОДАЛЬНОЕ ОКНО ДЕТАЛЬНОГО ПРОСМОТРА КАРТОЧЕК */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(4px); }
        .modal-content { background: #1e1e24; border: 2px solid #323238; border-radius: 12px; max-width: 400px; width: 100%; padding: 25px; position: relative; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .modal-close { position: absolute; top: 12px; right: 15px; font-size: 24px; color: #7c7c8a; cursor: pointer; transition: 0.15s; font-weight: bold; }
        .modal-close:hover { color: #fff; }
        
        /* Увеличенный аватар в окне просмотра */
        .modal-avatar { width: 120px; height: 120px; border-radius: 10px; display: flex; flex-wrap: wrap; overflow: hidden; padding: 4px; background: #141416; border: 2px solid #29292e; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 5px; }
        .modal-avatar .pixel { width: 33.33%; height: 33.33%; }
        
        .modal-name { font-size: 22px; font-weight: bold; color: #fff; margin: 0; }
        .modal-info { background: #141416; padding: 12px; border-radius: 8px; width: 100%; text-align: left; font-size: 14px; display: flex; flex-direction: column; gap: 6px; border: 1px solid #29292e; }
        .modal-info div { display: flex; justify-content: space-between; border-bottom: 1px dashed #29292e; padding-bottom: 4px; }
        .modal-info div:last-child { border-bottom: none; padding-bottom: 0; }
        .modal-info b { color: #fff; }
        
        @media (max-width: 600px) {
            body { padding: 5px; }
            .top-bar { padding: 10px; gap: 8px; }
            .top-controls { justify-content: center; text-align: center; }
            .title-group { text-align: center; width: 100%; }
            .control-buttons { flex-direction: column; width: 100%; align-items: stretch; }
            button { width: 100%; }
            #camera-view { max-width: 100%; height: 110px; }
            .pokedex-grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 4px; }
            .medal { font-size: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>

    <!-- СКЛАДНАЯ ВЕРХНЯЯ ПАНЕЛЬ С УПРАВЛЕНИЕМ -->
    <div id="topBar" class="top-bar">
        <div class="top-controls">
            <div class="title-group">
                <h1>🛰️ Ink zoo 1000</h1>
                <p>Кликните по любой карте для просмотра. Добавлена сортировка открытых!</p>
            </div>
            <button id="toggleBtn" class="toggle-btn" onclick="togglePanel()">▲ СВЕРНУТЬ</button>
        </div>
        
        <div class="collapsible-content">
            <!-- БЛОК ДОСТИЖЕНИЙ (5 НАГРАД) -->
            <div class="achievements-box">
                <div id="medal-fire" class="medal">🔥 Повелитель Пламени</div>
                <div id="medal-water" class="medal">💧 Магистр Глубин</div>
                <div id="medal-earth" class="medal">⛰️ Хранитель Гор</div>
                <div id="medal-air" class="medal">💨 Владыка Небес</div>
                <div id="medal-all" class="medal">🏆 Легенда Ink zoo</div>
            </div>

            <div class="control-buttons">
                <video id="camera-view" autoplay playsinline></video>
                <div id="status" class="status-box">Готов к сканированию местности...</div>
                <div class="counter-badge">🎒 ЗООПАРК: <span id="bag-count">0</span> / 1000</div>
                <button id="hunt-btn" onclick="triggerCapture()">📷 ИСКАТЬ</button>
                <button class="reset-btn" onclick="resetCollection()">🗑️ СБРОС</button>
            </div>
            
            <!-- СОРТИРОВКА И ВКЛАДКА "ОТКРЫТЫЕ" -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterElement('all', this)">Все</button>
                <button class="filter-btn" onclick="filterElement('Огонь 🔥', this)">Огонь 🔥</button>
                <button class="filter-btn" onclick="filterElement('Вода 💧', this)">Вода 💧</button>
                <button class="filter-btn" onclick="filterElement('Земля ⛰️', this)">Земля ⛰️</button>
                <button class="filter-btn" onclick="filterElement('Воздух 💨', this)">Воздух 💨</button>
                <button class="filter-btn owned-filter" onclick="filterElement('owned', this)">Открытые ✅</button>
            </div>
        </div>
    </div>

    <!-- РЕЗИНОВАЯ СЕТКА СУЩЕСТВ -->
    <div id="pokedex-grid" class="pokedex-grid"></div>

    <!-- ВСПЛЫВАЮЩЕЕ ОКНО ПРОСМОТРА КАРТЫ -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalBadge"></div>
            <div id="modalAvatarBox" class="modal-avatar"></div>
            <h2 id="modalName" class="modal-name"></h2>
            
            <div class="modal-info">
                <div>Статус: <b id="modalStatus"></b></div>
                <div>Стихия: <b id="modalElement"></b></div>
                <div>Способность: <b id="modalAbility"></b></div>
                <div>Шанс поимки: <b id="modalChance"></b></div>
                <div>Уникальный ID: <b id="modalId"></b></div>
            </div>
        </div>
    </div>

    <script>
        const elements = ["Огонь 🔥", "Вода 💧", "Земля ⛰️", "Воздух 💨"];
        const prefixes = ["Пиро", "Аква", "Гео", "Аэро", "Вулкан", "Гидро", "Терра", "Зефир", "Сильф", "Некро", "Торнадо", "Цунами", "Магма", "Небула", "Тор", "Флейм", "Шторм", "Глейшер", "Титано", "Спарк", "Крио", "Электро", "Пси", "Омега", "Альфа", "Вектор"];
        const roots = ["завр", "линг", "дог", "винг", "попот", "раптор", "мандер", "бро", "рекс", "стелла", "титан", "вульф", "клон", "лорд", "сфинкс", "кракен", "дракон", "феникс", "грифон", "элементаль", "трон", "морф", "корн", "цеце"];
        const abilities = ["Огненный смерч", "Абсолютный ноль", "Землетрясение", "Удар молнии", "Вызов цунами", "Каменный щит", "Вакуумный взрыв", "Кипящий гейзер", "Телепортация", "Гравитация", "Ментальный шторм", "Сверхновая", "Лавовый плевок", "Песчаная буря", "Звуковой удар", "Ледяной луч"];

        let currentFilter = 'all';

        // Переключение видимости панели управления
        function togglePanel() {
            const bar = document.getElementById('topBar');
            const btn = document.getElementById('toggleBtn');
            if (bar.classList.contains('collapsed')) {
                bar.classList.remove('collapsed');
                btn.innerText = "▲ СВЕРНУТЬ";
            } else {
                bar.classList.add('collapsed');
                btn.innerText = "▼ РАЗВЕРНУТЬ";
            }
        }

        // Математический генератор случайных чисел по сиду
        function seededRandom(seed) {
            let x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        // Внутренний генератор пиксельной графики аватарок по стихиям
        function generateAvatarHTML(id, element, rarity, isModal = false) {
            let colors = [];
            if (element.includes("Огонь")) {
                colors = ["#e63946", "#ff5400", "#ff7b00", "#ff9e00"];
            } else if (element.includes("Вода")) {
                colors = ["#00b4d8", "#0077b6", "#90e0ef", "#03045e"];
            } else if (element.includes("Земля")) {
                colors = ["#2a9d8f", "#70e000", "#38b000", "#007200"];
            } else if (element.includes("Воздух")) {
                colors = ["#b5179e", "#7209b7", "#4895ef", "#a2d2ff"];
            }

            if (rarity === "БОЖЕСТВЕННЫЙ") colors.unshift("#ffb703");
            if (rarity === "Эпический") colors.unshift("#e04545");

            let html = '';
            for (let i = 1; i <= 9; i++) {
                let rand = seededRandom(id * i * 4);
                let color = rand > 0.4 ? colors[Math.floor(rand * colors.length)] : "#141416";
                html += `<div class="pixel" style="background: ${color}"></div>`;
            }
            return html;
        }

        // Создание базы из 1000 существ
        function generatePokedex() {
            let list = [];
            for (let i = 1; i <= 1000; i++) {
                let r1 = seededRandom(i * 3);
                let r2 = seededRandom(i * 7);
                let r3 = seededRandom(i * 13);
                
                let elem = elements[Math.floor(r1 * elements.length)];
                let name = prefixes[Math.floor(r2 * prefixes.length)] + roots[Math.floor(r3 * roots.length)] + "-" + i;
                let ability = abilities[Math.floor(r1 * abilities.length)];
                
                let rarity, chance;
                if (i <= 500) { rarity = "Обычный"; chance = 0.120; }
                else if (i <= 850) { rarity = "Редкий"; chance = 0.085; }
                else if (i <= 970) { rarity = "Эпический"; chance = 0.066; }
                else { rarity = "БОЖЕСТВЕННЫЙ"; chance = 0.066; }

                list.push({ id: i, name, element: elem, ability, rarity, chance_pct: chance.toFixed(3) });
            }
            return list;
        }

        const allCreatures = generatePokedex();
        let myCollection = JSON.parse(localStorage.getItem('ink_zoo_bag_ach_1000')) || [];
        // ФУНКЦИЯ ДЕТАЛЬНОГО ПРОСМОТРА КАРТОЧКИ
        function openModal(id) {
            const p = allCreatures.find(item => item.id === id);
            const ownedIds = new Set(myCollection.map(c => c.id));
            const isOwned = ownedIds.has(p.id);

            // Заполняем данные в модальном окне
            document.getElementById('modalName').innerText = p.name;
            document.getElementById('modalStatus').innerHTML = isOwned ? '<span style="color:#04d361">✅ В ЗООПАРКЕ</span>' : '<span style="color:#7c7c8a">🔒 ДИКИЙ СУЩЕСТВО</span>';
            document.getElementById('modalElement').innerText = p.element;
            document.getElementById('modalAbility').innerText = p.ability;
            document.getElementById('modalChance').innerText = p.chance_pct + '%';
            document.getElementById('modalId').innerText = '#' + p.id;
            
            // Ставим крупный аватар и бейдж редкости
            document.getElementById('modalBadge').innerHTML = `<span class="badge badge-${p.rarity}">${p.rarity}</span>`;
            document.getElementById('modalAvatarBox').innerHTML = generateAvatarHTML(p.id, p.element, p.rarity);

            // Показываем окно
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // ПРОВЕРКА И АКТИВИЗАЦИЯ ДОСТИЖЕНИЙ (5 МЕДАЛЕЙ)
        function checkAchievements() {
            const ownedIds = new Set(myCollection.map(c => c.id));
            
            // Считаем, сколько существ каждой стихии у нас есть
            let counts = { "Огонь 🔥": 0, "Вода 💧": 0, "Земля ⛰️": 0, "Воздух 💨": 0 };
            let totals = { "Огонь 🔥": 0, "Вода 💧": 0, "Земля ⛰️": 0, "Воздух 💨": 0 };

            allCreatures.forEach(p => {
                totals[p.element]++;
                if (ownedIds.has(p.id)) counts[p.element]++;
            });

            // Вешаем класс unlocked, если собрана вся категория целиком
            if (counts["Огонь 🔥"] === totals["Огонь 🔥"]) document.getElementById('medal-fire').classList.add('unlocked');
            else document.getElementById('medal-fire').classList.remove('unlocked');

            if (counts["Вода 💧"] === totals["Вода 💧"]) document.getElementById('medal-water').classList.add('unlocked');
            else document.getElementById('medal-water').classList.remove('unlocked');

            if (counts["Земля ⛰️"] === totals["Земля ⛰️"]) document.getElementById('medal-earth').classList.add('unlocked');
            else document.getElementById('medal-earth').classList.remove('unlocked');

            if (counts["Воздух 💨"] === totals["Воздух 💨"]) document.getElementById('medal-air').classList.add('unlocked');
            else document.getElementById('medal-air').classList.remove('unlocked');

            if (myCollection.length === 1000) document.getElementById('medal-all').classList.add('unlocked');
            else document.getElementById('medal-all').classList.remove('unlocked');
        }

        // ОТРИСОВКА ИНТЕРФЕЙСА С УЧЕТОМ ФИЛЬТРОВ И ВКЛАДКИ "ОТКРЫТЫЕ"
        function renderUI() {
            const grid = document.getElementById('pokedex-grid');
            const fragment = document.createDocumentFragment();
            const ownedIds = new Set(myCollection.map(c => c.id));
            
            allCreatures.forEach(p => {
                // Логика вкладки "Открытые"
                if (currentFilter === 'owned' && !ownedIds.has(p.id)) return;
                // Логика стандартных фильтров стихий
                if (currentFilter !== 'all' && currentFilter !== 'owned' && p.element !== currentFilter) return;

                const isOwned = ownedIds.has(p.id);
                const elCard = document.createElement('div');
                elCard.className = `card rarity-${p.rarity} ${isOwned ? 'owned' : ''}`;
                // Навешиваем клик для открытия модального окна просмотра
                elCard.setAttribute('onclick', `openModal(${p.id})`);
                
                elCard.innerHTML = `
                    <span class="badge badge-${p.rarity}">${p.rarity}</span>
                    <div class="avatar-box">${generateAvatarHTML(p.id, p.element, p.rarity)}</div>
                    <div class="card-name">${p.name}</div>
                    <div class="card-elem">${p.element}</div>
                    <div class="card-ability">${p.ability}</div>
                    <div class="chance-lbl">🎯 ${p.chance_pct}%</div>
                    <div class="status-tag" style="color:${isOwned ? '#04d361':'#494950'}">
                        ${isOwned ? '✅ В ЗОО' : '🔒 ДИКИЙ'}
                    </div>`;
                    
                fragment.appendChild(elCard);
            });

            grid.innerHTML = '';
            grid.appendChild(fragment);
            
            document.getElementById('bag-count').innerText = myCollection.length;
            checkAchievements();
        }

        function filterElement(elementName, btnElement) {
            currentFilter = elementname;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderUI();
        }

        // ЗЕРКАЛЬНЫЙ СКАНЕР КАМЕРЫ И ЛОВЛЯ
        async function triggerCapture() {
            const video = document.getElementById('camera-view');
            const status = document.getElementById('status');
            const btn = document.getElementById('hunt-btn');
            
            btn.disabled = true;
            status.innerText = "📡 Сканирование пространства...";
            
            try {
                if (!video.srcObject) {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = stream;
                    video.style.display = "block";
                }
            } catch (err) {
                console.log("Камера недоступна");
            }

            setTimeout(() => {
                let roll = Math.random();
                let targetRarity;
                
                if (roll <= 0.02) targetRarity = "БОЖЕСТВЕННЫЙ";
                else if (roll <= 0.10) targetRarity = "Эпический";
                else if (roll <= 0.40) targetRarity = "Редкий";
                else targetRarity = "Обычный";

                let pool = allCreatures.filter(c => c.rarity === targetRarity);
                let caught = pool[Math.floor(Math.random() * pool.length)];

                if (!myCollection.some(item => item.id === caught.id)) {
                    myCollection.push(caught);
                    localStorage.setItem('ink_zoo_bag_ach_1000', JSON.stringify(myCollection));
                    status.innerHTML = `🎉 Пойман новый: <b style="color:#fff;">${caught.name}</b>!`;
                } else {
                    status.innerHTML = `📡 Повторка: <b style="color:#fff;">${caught.name}</b>`;
                }

                renderUI();
                btn.disabled = false;
                
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                    video.style.display = "none";
                }
            }, 1200);
        }

        function resetCollection() {
            if (confirm("Выпустить всех существ из зоопарка и сбросить достижения?")) {
                myCollection = [];
                localStorage.removeItem('ink_zoo_bag_ach_1000');
                document.getElementById('status').innerText = "Все существа на воле!";
                renderUI();
            }
        }

        // Запуск интерфейса
        renderUI();
    </script>
</body>
</html>
