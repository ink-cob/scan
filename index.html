<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инвентарь</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-[#17212b] text-[#f5f5f5] p-4 font-sans text-sm">

    <div id="app" class="max-w-5xl mx-auto space-y-4">
        <!-- Форма ввода в одну строку -->
        <form @submit.prevent="add" class="bg-[#1e2c3a] p-3 rounded-lg border border-[#202b36] flex flex-wrap gap-2 items-center">
            <input v-model="f.b" placeholder="Производитель" required class="flex-1 min-w-[150px] bg-[#17212b] p-2 rounded border border-[#2f3e4e] text-white focus:outline-none">
            <input v-model="f.m" placeholder="Модель" required class="flex-1 min-w-[150px] bg-[#17212b] p-2 rounded border border-[#2f3e4e] text-white focus:outline-none">
            <input v-model="f.s" placeholder="Серийный номер" required class="flex-1 min-w-[150px] bg-[#17212b] p-2 rounded border border-[#2f3e4e] text-white focus:outline-none">
            <button type="submit" class="bg-[#5288c1] hover:bg-[#4374a5] px-4 py-2 rounded font-semibold text-white">Добавить ({{list.length}})</button>
            <button v-if="list.length" type="button" @click="clearAll" class="text-xs text-[#e53935] hover:underline px-2">Очистить всё</button>
        </form>

        <!-- Подсказка для пользователя -->
        <div v-if="list.length" class="text-xs text-[#8aa1b5] text-right">💡 Совет: выделите таблицу мышкой, нажмите Ctrl+C и вставьте в Word через Ctrl+V</div>

        <!-- Полноценная таблица -->
        <div v-if="list.length" class="bg-[#1e2c3a] rounded-lg border border-[#202b36] overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-[#17212b] text-[#8aa1b5] border-b border-[#202b36] text-xs uppercase">
                        <th class="p-3 w-12 border border-[#202b36]">№</th>
                        <th class="p-3 border border-[#202b36]">Производитель</th>
                        <th class="p-3 border border-[#202b36]">Модель</th>
                        <th class="p-3 border border-[#202b36]">Серийный номер</th>
                        <th class="p-3 w-20 text-center border border-[#202b36] select-none">Удалить</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="(item, i) in list" :key="i" class="hover:bg-[#24303f] border-b border-[#202b36]">
                        <td class="p-3 font-mono text-xs text-[#8aa1b5] border border-[#202b36]">{{i+1}}</td>
                        <td class="p-3 font-semibold text-white border border-[#202b36]">{{item.b}}</td>
                        <td class="p-3 text-[#b9cbd9] border border-[#202b36]">{{item.m}}</td>
                        <td class="p-3 font-mono text-xs border border-[#202b36]">{{item.s}}</td>
                        <td class="p-3 text-center border border-[#202b36] select-none">
                            <button @click="del(i)" class="text-[#e53935] hover:text-[#ff5252] hover:underline text-xs">Х</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const list = ref(JSON.parse(localStorage.getItem('inv_data') || '[]'));
                const f = ref({ b: '', m: '', s: '' });

                const add = () => {
                    list.value.push({ ...f.value });
                    localStorage.setItem('inv_data', JSON.stringify(list.value));
                    f.value = { b: '', m: '', s: '' }; // быстрая очистка формы
                };

                const del = (i) => {
                    list.value.splice(i, 1);
                    localStorage.setItem('inv_data', JSON.stringify(list.value));
                };

                const clearAll = () => {
                    if (confirm("Удалить ВСЕ записи из таблицы?")) {
                        list.value = [];
                        localStorage.removeItem('inv_data');
                    }
                };

                return { list, f, add, del, clearAll };
            }
        }).mount('#app');
    </script>
</body>
</html>
