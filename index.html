<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инвентарь</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-[#17212b] text-[#f5f5f5] p-4 font-sans">

    <div id="app" class="max-w-md mx-auto bg-[#1e2c3a] p-4 rounded-xl border border-[#202b36] shadow-xl">
        <div class="flex justify-between items-center mb-4 text-[#8aa1b5] text-sm">
            <span class="font-bold text-[#5288c1]">🖥️ Инвентаризация</span>
            <button v-if="list.length" @click="exportDoc" class="text-[#5288c1] font-semibold hover:underline">Скачать Word ({{list.length}})</button>
        </div>

        <form @submit.prevent="add" class="space-y-3 mb-4">
            <input v-model="f.b" placeholder="Производитель" required class="w-full bg-[#17212b] p-2 rounded text-sm border border-[#2f3e4e] focus:outline-none">
            <input v-model="f.m" placeholder="Модель" required class="w-full bg-[#17212b] p-2 rounded text-sm border border-[#2f3e4e] focus:outline-none">
            <input v-model="f.s" placeholder="Серийный номер" required class="w-full bg-[#17212b] p-2 rounded text-sm border border-[#2f3e4e] focus:outline-none">
            <button type="submit" class="w-full bg-[#5288c1] p-2 rounded text-sm font-semibold hover:bg-[#4374a5]">Добавить в список</button>
        </form>

        <div v-for="(item, i) in list" :key="i" class="flex justify-between items-center bg-[#17212b] p-2 rounded text-xs mb-1">
            <div>{{i+1}}. <span class="text-[#5288c1] font-bold">{{item.b}}</span> {{item.m}} <span class="text-[#8aa1b5] font-mono">[{{item.s}}]</span></div>
            <button @click="del(i)" class="text-[#e53935] ml-2 hover:underline">Х</button>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const list = ref(JSON.parse(localStorage.getItem('inv') || '[]'));
                const f = ref({ b: '', m: '', s: '' });

                const add = () => {
                    list.value.push({ ...f.value });
                    localStorage.setItem('inv', JSON.stringify(list.value));
                    f.value = { b: '', m: '', s: '' };
                };

                const del = (i) => {
                    list.value.splice(i, 1);
                    localStorage.setItem('inv', JSON.stringify(list.value));
                };

                const exportDoc = () => {
                    const rows = [new docx.TableRow({ children: ["№", "Бренд", "Модель", "S/N"].map(t => new docx.TableCell({ children: [new docx.Paragraph({ text: t, bold: true })] })) })];
                    list.value.forEach((m, idx) => {
                        rows.push(new docx.TableRow({ children: [String(idx + 1), m.b, m.m, m.s].map(t => new docx.TableCell({ children: [new docx.Paragraph({ text: t })] })) }));
                    });
                    const doc = new docx.Document({ sections: [{ children: [new docx.Table({ rows, width: { size: 100, type: docx.WidthType.PERCENTAGE } })] }] });
                    window.docx.Packer.toBlob(doc).then(blob => {
                        const a = document.createElement("a");
                        a.href = URL.createObjectURL(blob);
                        a.download = "inventory.docx";
                        a.click();
                    });
                };

                return { list, f, add, del, exportDoc };
            }
        }).mount('#app');
    </script>
</body>
</html>
